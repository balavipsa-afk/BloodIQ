<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{% block title %}BloodIQ{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --red: #C0152A;
      --red-dark: #8B0000;
      --red-deep: #3A0008;
      --white: #FFFFFF;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      color: var(--white);

      background:
        linear-gradient(rgba(30,0,5,0.75), rgba(30,0,5,0.9)),
        url("{{ url_for('static', filename='images/blood_bg.jpg') }}");

      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;

      display: flex;
      align-items: center;
      justify-content: space-between;

      padding: 16px 36px;

      background: rgba(30,0,5,0.85);
      backdrop-filter: blur(12px);

      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 900;
      color: var(--white);
      text-decoration: none;
    }

    .nav-logo span {
      color: var(--red);
    }

    .nav-back {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-back:hover {
      color: #FF8A95;
    }

    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 52px 24px 80px;
      animation: fadeUp 0.5s ease both;
    }

    .page-header {
      margin-bottom: 40px;
    }

    .page-emoji {
      font-size: 52px;
      display: block;
      margin-bottom: 16px;
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .page-subtitle {
      font-size: 15px;
      font-weight: 300;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
    }

    .form-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 36px 32px;
      backdrop-filter: blur(10px);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    input, select {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--white);
      font-size: 15px;
      outline: none;
    }

    input::placeholder {
      color: rgba(255,255,255,0.3);
    }

    .btn-submit {
      width: 100%;
      padding: 16px;
      background: var(--red);
      border: none;
      border-radius: 12px;
      color: var(--white);
      font-size: 15px;
      cursor: pointer;
    }

    .btn-submit:hover {
      background: #a0101f;
    }

    .result-box {
      margin-top: 28px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 28px;
      display: none;
    }

    .result-box.visible {
      display: block;
    }

    .disclaimer {
      margin-top: 28px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      text-align: center;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <nav>
    <a href="/" class="nav-logo">Blood<span>IQ</span></a>
    <a href="/" class="nav-back">← Back to home</a>
  </nav>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <script>
    document.querySelectorAll('input[type="range"]').forEach(slider => {
      const output = document.getElementById(slider.id + '_val');
      if (output) output.textContent = slider.value;

      slider.addEventListener('input', () => {
        if (output) output.textContent = slider.value;
      });
    });
  </script>

</body>
</html>
