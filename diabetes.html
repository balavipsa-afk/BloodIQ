<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Diabetes Risk Checker</title>

<style>
  body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #4da6ff, #00264d);
    color: #ffffff;
  }

  .wrapper {
    max-width: 820px;
    margin: 40px auto;
    padding: 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 30px;
  }

  .title {
    margin: 0;
    font-size: 28px;
  }

  .subtitle {
    font-size: 14px;
    opacity: 0.8;
  }

  .card {
    background: rgba(255,255,255,0.08);
    padding: 28px;
    border-radius: 14px;
    backdrop-filter: blur(6px);
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  .field label {
    display: block;
    font-size: 13px;
    margin-bottom: 6px;
    font-weight: 600;
  }

  .field input {
    width: 100%;
    padding: 11px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 14px;
  }

  .btn {
    width: 100%;
    padding: 13px;
    margin-top: 28px;
    border-radius: 10px;
    border: none;
    font-weight: 600;
    background: #ffffff;
    color: #00264d;
    cursor: pointer;
    transition: 0.2s;
  }

  .btn:hover {
    background: #e6f0ff;
  }

  .result {
    margin-top: 25px;
    padding: 20px;
    background: rgba(0,0,0,0.25);
    border-radius: 12px;
    text-align: center;
    display: none;
  }

  .result.show {
    display: block;
  }

  .status {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .note {
    text-align: center;
    margin-top: 18px;
    font-size: 12px;
    opacity: 0.7;
  }
</style>
</head>

<body>

<div class="wrapper">

  <div class="header">
    <h1 class="title">🩸 Diabetes Risk Checker</h1>
    <p class="subtitle">Enter your health details to estimate your risk</p>
  </div>

  <div class="card">

    <div class="grid">

      <div class="field">
        <label>Glucose Level (mg/dL)</label>
        <input type="number" id="glucose" placeholder="100">
      </div>

      <div class="field">
        <label>BMI</label>
        <input type="number" id="bmi" placeholder="25">
      </div>

      <div class="field">
        <label>Age</label>
        <input type="number" id="age" placeholder="30">
      </div>

      <div class="field">
        <label>Blood Pressure</label>
        <input type="number" id="bp" placeholder="80">
      </div>

      <div class="field">
        <label>Insulin Level</label>
        <input type="number" id="insulin" placeholder="80">
      </div>

      <div class="field">
        <label>Skin Thickness</label>
        <input type="number" id="skin" placeholder="20">
      </div>

      <div class="field">
        <label>Diabetes Pedigree</label>
        <input type="number" id="pedigree" step="0.01" placeholder="0.5">
      </div>

      <div class="field">
        <label>Pregnancies</label>
        <input type="number" id="pregnancies" placeholder="0">
      </div>

    </div>

    <button class="btn" onclick="checkRisk()">Analyse Risk</button>

    <div class="result" id="resultBox">
      <p class="status" id="riskText"></p>
      <p id="scoreText"></p>
      <p id="adviceText"></p>
    </div>

  </div>

  <p class="note">⚕ This is an AI-based estimate. Consult a doctor for medical advice.</p>

</div>

<script>
async function checkRisk() {

  const inputData = {
    glucose: Number(document.getElementById('glucose').value),
    bmi: Number(document.getElementById('bmi').value),
    age: Number(document.getElementById('age').value),
    bp: Number(document.getElementById('bp').value),
    insulin: Number(document.getElementById('insulin').value),
    skin: Number(document.getElementById('skin').value),
    pedigree: Number(document.getElementById('pedigree').value),
    pregnancies: Number(document.getElementById('pregnancies').value)
  };

  const button = document.querySelector('.btn');
  button.textContent = 'Analysing...';
  button.disabled = true;

  try {
    const response = await fetch('/predict/diabetes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(inputData)
    });

    const result = await response.json();

    document.getElementById('riskText').textContent = result.risk;
    document.getElementById('scoreText').textContent = `Risk Score: ${result.score}/100`;
    document.getElementById('adviceText').textContent = result.advice;

    document.getElementById('resultBox').classList.add('show');

  } catch (error) {
    alert("Unable to connect to server");
  }

  button.textContent = 'Analyse Risk';
  button.disabled = false;
}
</script>

</body>
</html>
